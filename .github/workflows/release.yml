name: Release on Version Update

on:
  push:
    branches:
      - main
      - master
    paths:
      - 'app/build.gradle.kts'
  # 添加手动触发用于调试
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check if Version Changed
        id: check_version
        run: |
          # 改进的版本提取方式
          VERSION_NAME=$(grep -o 'versionName\s*=\s*"[^"]*"' app/build.gradle.kts | head -1 | sed 's/versionName\s*=\s*"\([^"]*\)"/\1/')
          echo "当前代码中的 versionName: $VERSION_NAME"
          
          if [ -z "$VERSION_NAME" ]; then
            echo "未能提取到 versionName，退出。"
            exit 1
          fi
          
          TAG_NAME="v$VERSION_NAME"
          echo "tag_name=$TAG_NAME" >> $GITHUB_OUTPUT
          
          # 检查对应的 tag 是否已经存在
          if git ls-remote --tags origin | grep -q "refs/tags/$TAG_NAME"; then
            echo "Tag $TAG_NAME 已经存在，跳过后续操作。"
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "检测到新版本，将构建并发布 $TAG_NAME。"
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Debug - Show Version Info
        if: always()
        run: |
          echo "Changed: ${{ steps.check_version.outputs.changed }}"
          echo "Tag: ${{ steps.check_version.outputs.tag_name }}"

      - name: Generate Changelog
        if: steps.check_version.outputs.changed == 'true'
        id: changelog
        run: |
          PREV_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          
          if [ -z "$PREV_TAG" ]; then
            COMMITS=$(git log --no-merges --pretty=format:"%s")
          else
            COMMITS=$(git log $PREV_TAG..HEAD --no-merges --pretty=format:"%s")
          fi
          
          echo "" > changelog.txt
          
          FEATS=$(echo "$COMMITS" | grep "^feat:" | sed 's/^feat:[[:space:]]*/- /' || true)
          if [ -n "$FEATS" ]; then
            echo "## 功能" >> changelog.txt
            echo "$FEATS" >> changelog.txt
            echo "" >> changelog.txt
          fi
          
          FIXES=$(echo "$COMMITS" | grep "^fix:" | sed 's/^fix:[[:space:]]*/- /' || true)
          if [ -n "$FIXES" ]; then
            echo "## 修复" >> changelog.txt
            echo "$FIXES" >> changelog.txt
            echo "" >> changelog.txt
          fi
          
          if [ -z "$FEATS" ] && [ -z "$FIXES" ]; then
            echo "常规更新与优化" >> changelog.txt
          fi
          
          cat changelog.txt

      - name: Setup Java
        if: steps.check_version.outputs.changed == 'true'
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'gradle'

      - name: Decode Keystore
        if: steps.check_version.outputs.changed == 'true'
        env:
          ENCODED_KEYSTORE: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          echo $ENCODED_KEYSTORE | base64 -d > $RUNNER_TEMP/keystore.jks

      - name: Build Release APK
        if: steps.check_version.outputs.changed == 'true'
        env:
          KEYSTORE_FILE_PATH: ${{ runner.temp }}/keystore.jks
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          GOOGLE_MAPS_API_KEY: ${{ secrets.GOOGLE_MAPS_API_KEY }}
        run: |
          chmod +x ./gradlew
          ./gradlew --no-daemon :app:assembleRelease
          
          APK_DIR="app/build/outputs/apk/release"
          find $APK_DIR -name "*.apk" -print0 | while IFS= read -r -d '' file; do
            mv "$file" "$APK_DIR/LocationSpoofer-${{ steps.check_version.outputs.tag_name }}.apk"
          done

      - name: Publish GitHub Release
        if: steps.check_version.outputs.changed == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.check_version.outputs.tag_name }}
          name: LocationSpoofer ${{ steps.check_version.outputs.tag_name }}
          body_path: changelog.txt
          files: app/build/outputs/apk/release/LocationSpoofer-*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}